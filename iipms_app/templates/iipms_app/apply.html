{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply - IIPMS</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <!-- Django flash messages (success/error banners) -->
    {% if messages %}
    <div style="position:fixed;top:70px;right:20px;z-index:9999;width:320px;">
        {% for message in messages %}
        <div style="background:{% if message.tags == 'success' %}#dcfce7{% elif message.tags == 'danger' %}#fee2e2{% else %}#fef9c3{% endif %};
                    border-radius:8px;padding:12px 16px;margin-bottom:8px;
                    color:{% if message.tags == 'success' %}#15803d{% elif message.tags == 'danger' %}#b91c1c{% else %}#a16207{% endif %};
                    font-size:14px;font-weight:bold;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}


    <header class="navbar">
        <div class="logo">IIPMS</div>
        <nav>
            <ul>
                <li><a href="{% url 'student_dashboard' %}">Dashboard</a></li>
                <li><a href="{% url 'internship_list' %}">Internships</a></li>
                <li><a href="{% url 'matches' %}">Matches</a></li>
                <li><a href="/logout/" class="btn">Logout</a></li>
            </ul>
        </nav>
    </header>

    <section class="page-title">
        <h1>Apply for Internship</h1>
        <p>Submit your application details</p>
    </section>

    <section class="apply-section">
        <div class="apply-container">
            <form id="applicationForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label>Internship Role</label>
                    <input type="text" id="role" placeholder="e.g. Frontend Developer Intern" required>
                </div>
                <div class="input-group">
                    <label>Skills</label>
                    <input type="text" id="skills" placeholder="e.g. HTML, CSS, JS">
                </div>
                <div class="input-group">
                    <label>Why should we hire you?</label>
                    <textarea id="message" rows="4" placeholder="Write a short statement..."></textarea>
                </div>
                <button type="submit" class="apply-btn">Submit Application</button>
            </form>
        </div>
    </section>

    <footer><p>© 2026 IIPMS | Application Page</p></footer>

    <script src="{% static 'js/auth.js' %}"></script>
    <script src="{% static 'js/data.js' %}"></script>
    <script>
        // Pre-fill form from session
        const session = null;
        if (session) {
            document.getElementById("name").value = session.firstName + " " + session.lastName;
            document.getElementById("email").value = session.email;
        }

        document.getElementById("applicationForm").addEventListener("submit", function(e) {
            e.preventDefault();

            saveApplication(
                session.id,
                document.getElementById("name").value,
                document.getElementById("email").value,
                document.getElementById("skills").value,
                "direct-" + session.id + "-" + Date.now(),
                document.getElementById("role").value,
                "Direct Application"
            );
            alert("Application submitted successfully!");
            document.getElementById("applicationForm").reset();

            // Re-fill name/email after reset
            document.getElementById("name").value = session.firstName + " " + session.lastName;
            document.getElementById("email").value = session.email;
        });
    </script>
<form id="logout-form" method="POST" action="{% url 'logout' %}">{% csrf_token %}</form>
</body>
</html>
